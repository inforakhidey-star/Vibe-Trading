name: TradingBot
on:
  workflow_dispatch: # Eita thakar mane holo tumi GitHub Actions theke manually chalu ba bondho korte parbe

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install All Trading Tools
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot yfinance matplotlib pandas mplfinance

      - name: Run Vibe Trading Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # Jodi Alpha Vantage ba onno key thake, segulo niche add korte hobe
        run: python main.py
        
